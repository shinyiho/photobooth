<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" width="200" height="100">
  <!-- Left hair clip -->
  <g transform="translate(10, 10)">
    <!-- Clip body -->
    <rect x="0" y="0" width="75" height="32" rx="10" ry="10" fill="#ff1493" stroke="#222" stroke-width="4" stroke-linejoin="round"/>
    <!-- Clip hinge bumps -->
    <circle cx="20" cy="16" r="4" fill="#ff69b4" stroke="#222" stroke-width="2"/>
    <circle cx="37" cy="16" r="4" fill="#ff69b4" stroke="#222" stroke-width="2"/>
    <circle cx="54" cy="16" r="4" fill="#ff69b4" stroke="#222" stroke-width="2"/>
    <!-- Bottom jaw -->
    <path d="M5,32 L5,50 Q5,58 13,58 L62,58 Q70,58 70,50 L70,32" fill="none" stroke="#222" stroke-width="4" stroke-linecap="round"/>
    <!-- Shine -->
    <rect x="8" y="6" width="18" height="6" rx="3" fill="rgba(255,255,255,0.45)"/>
  </g>
  <!-- Right hair clip (mirrored, slight angle) -->
  <g transform="translate(105, 8) rotate(5, 37, 30)">
    <rect x="0" y="0" width="75" height="32" rx="10" ry="10" fill="#ff1493" stroke="#222" stroke-width="4" stroke-linejoin="round"/>
    <circle cx="20" cy="16" r="4" fill="#ff69b4" stroke="#222" stroke-width="2"/>
    <circle cx="37" cy="16" r="4" fill="#ff69b4" stroke="#222" stroke-width="2"/>
    <circle cx="54" cy="16" r="4" fill="#ff69b4" stroke="#222" stroke-width="2"/>
    <path d="M5,32 L5,50 Q5,58 13,58 L62,58 Q70,58 70,50 L70,32" fill="none" stroke="#222" stroke-width="4" stroke-linecap="round"/>
    <rect x="8" y="6" width="18" height="6" rx="3" fill="rgba(255,255,255,0.45)"/>
  </g>
  <!-- Tiny sparkle between clips -->
  <g transform="translate(95, 25)">
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <line x1="-4" y1="-4" x2="4" y2="4" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="4" y1="-4" x2="-4" y2="4" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
