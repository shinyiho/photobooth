<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 170" width="160" height="170">
  <defs>
    <!-- Slight wobble to mimic hand-drawn marker -->
    <filter id="handdrawn">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- Black outer glow -->
    <filter id="outerGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feFlood flood-color="#000" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="SourceAlpha" operator="in" result="shadow"/>
      <feGaussianBlur in="shadow" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#handdrawn)">
    <!-- Thick white border layer (painted multiple offsets for chunky marker border) -->
    <g filter="url(#outerGlow)">
      <text x="80" y="120" text-anchor="middle" font-family="'Hiragino Kaku Gothic Pro', 'Yu Gothic', 'Meiryo', 'MS Gothic', sans-serif" font-size="120" font-weight="900" letter-spacing="-2"
        fill="none" stroke="#fff" stroke-width="14" stroke-linejoin="round" stroke-linecap="round"
      >&#x611B;</text>
    </g>

    <!-- Hot pink fill -->
    <text x="80" y="120" text-anchor="middle" font-family="'Hiragino Kaku Gothic Pro', 'Yu Gothic', 'Meiryo', 'MS Gothic', sans-serif" font-size="120" font-weight="900" letter-spacing="-2"
      fill="#ff1493"
    >&#x611B;</text>

    <!-- Inner lighter pink for depth -->
    <text x="79" y="118" text-anchor="middle" font-family="'Hiragino Kaku Gothic Pro', 'Yu Gothic', 'Meiryo', 'MS Gothic', sans-serif" font-size="120" font-weight="900" letter-spacing="-2"
      fill="#ff69b4" opacity="0.5"
    >&#x611B;</text>

    <!-- Gel shine highlight on top-left area -->
    <clipPath id="textClip">
      <text x="80" y="120" text-anchor="middle" font-family="'Hiragino Kaku Gothic Pro', 'Yu Gothic', 'Meiryo', 'MS Gothic', sans-serif" font-size="120" font-weight="900" letter-spacing="-2"
      >&#x611B;</text>
    </clipPath>
    <g clip-path="url(#textClip)">
      <ellipse cx="60" cy="65" rx="28" ry="18" fill="rgba(255,255,255,0.35)" transform="rotate(-20,60,65)"/>
      <ellipse cx="95" cy="90" rx="12" ry="8" fill="rgba(255,255,255,0.2)" transform="rotate(-10,95,90)"/>
    </g>
  </g>

  <!-- Small heart doodle bottom-right -->
  <g transform="translate(128, 148) scale(0.8)" filter="url(#handdrawn)">
    <path d="M0,-5 Q0,-10 -5,-10 Q-10,-10 -10,-5 Q-10,0 0,7 Q10,0 10,-5 Q10,-10 5,-10 Q0,-10 0,-5 Z" fill="#ff1493" stroke="#fff" stroke-width="3" stroke-linejoin="round"/>
  </g>

  <!-- Sparkle top-left -->
  <g transform="translate(18, 22)" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
    <line x1="0" y1="-6" x2="0" y2="6"/>
    <line x1="-6" y1="0" x2="6" y2="0"/>
    <line x1="-4" y1="-4" x2="4" y2="4"/>
    <line x1="4" y1="-4" x2="-4" y2="4"/>
  </g>

  <!-- Small sparkle top-right -->
  <g transform="translate(145, 18)" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round">
    <line x1="0" y1="-4" x2="0" y2="4"/>
    <line x1="-4" y1="0" x2="4" y2="0"/>
  </g>
</svg>
