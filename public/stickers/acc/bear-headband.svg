<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 110" width="200" height="110">
  <defs>
    <filter id="sketch">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="4" seed="13" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#sketch)">
    <!-- Headband -->
    <path d="M20,95 Q100,65 180,95" fill="none" stroke="#333" stroke-width="5" stroke-linecap="round"/>
    <!-- Left ear outer -->
    <circle cx="48" cy="55" r="26" fill="#8b6c42" stroke="#333" stroke-width="4"/>
    <!-- Left ear inner -->
    <circle cx="48" cy="55" r="14" fill="#c4956a" stroke="#333" stroke-width="2.5"/>
    <!-- Right ear outer -->
    <circle cx="152" cy="55" r="26" fill="#8b6c42" stroke="#333" stroke-width="4"/>
    <!-- Right ear inner -->
    <circle cx="152" cy="55" r="14" fill="#c4956a" stroke="#333" stroke-width="2.5"/>
    <!-- Marker texture -->
    <path d="M36,48 Q44,38 56,44" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="4" stroke-linecap="round"/>
    <path d="M140,48 Q148,38 160,44" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
