  <circle cx="110" cy="91" r="6" fill="#ff1493" stroke="#222" stroke-width="2.5"/>
  <!-- Jewel shines -->
  <circle cx="48" cy="89" r="2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="78" cy="89" r="2.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="108" cy="89" r="2" fill="rgba(255,255,255,0.5)"/>
  <!-- Crown tip balls -->
  <circle cx="15" cy="33" r="6" fill="#ffd700" stroke="#222" stroke-width="3"/>
  <circle cx="80" cy="13" r="7" fill="#ffd700" stroke="#222" stroke-width="3"/>
  <circle cx="145" cy="33" r="6" fill="#ffd700" stroke="#222" stroke-width="3"/>
