<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" width="120" height="100">
  <defs>
    <filter id="sk">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3" seed="5" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#sk)">
    <!-- Antenna -->
    <line x1="35" y1="22" x2="18" y2="4" stroke="#555" stroke-width="3" stroke-linecap="round"/>
    <circle cx="18" cy="4" r="3" fill="#ff6b9d"/>
    <!-- Body -->
    <rect x="10" y="22" width="100" height="65" rx="12" fill="#2a2a3e" stroke="#444" stroke-width="3"/>
    <!-- Speaker grille (left) -->
    <circle cx="42" cy="54" r="20" fill="#1e1e30" stroke="#444" stroke-width="2"/>
    <circle cx="42" cy="54" r="15" fill="none" stroke="#333" stroke-width="1.5"/>
    <circle cx="42" cy="54" r="10" fill="none" stroke="#333" stroke-width="1"/>
    <circle cx="42" cy="54" r="5" fill="none" stroke="#333" stroke-width="0.8"/>
    <!-- Display panel (right) -->
    <rect x="68" y="34" width="36" height="16" rx="3" fill="#0a2a1a" stroke="#444" stroke-width="1.5"/>
    <!-- Frequency line -->
    <line x1="72" y1="42" x2="100" y2="42" stroke="#00e5ff" stroke-width="1" opacity="0.6"/>
    <circle cx="84" cy="42" r="2" fill="#00e5ff"/>
    <!-- Knobs -->
    <circle cx="74" cy="62" r="6" fill="#3a3a4e" stroke="#555" stroke-width="2"/>
    <circle cx="74" cy="62" r="2" fill="#ff6b9d"/>
    <circle cx="94" cy="62" r="6" fill="#3a3a4e" stroke="#555" stroke-width="2"/>
    <circle cx="94" cy="62" r="2" fill="#00e5ff"/>
    <!-- Buttons row -->
    <rect x="68" y="74" width="8" height="5" rx="1" fill="#c77dff" stroke="#444" stroke-width="1"/>
    <rect x="79" y="74" width="8" height="5" rx="1" fill="#ffe66d" stroke="#444" stroke-width="1"/>
    <rect x="90" y="74" width="8" height="5" rx="1" fill="#7bf178" stroke="#444" stroke-width="1"/>
    <!-- Speaker dots -->
    <g fill="#333" opacity="0.6">
      <circle cx="30" cy="42" r="1"/><circle cx="35" cy="42" r="1"/><circle cx="40" cy="42" r="1"/><circle cx="45" cy="42" r="1"/><circle cx="50" cy="42" r="1"/><circle cx="55" cy="42" r="1"/>
      <circle cx="30" cy="47" r="1"/><circle cx="35" cy="47" r="1"/><circle cx="40" cy="47" r="1"/><circle cx="45" cy="47" r="1"/><circle cx="50" cy="47" r="1"/><circle cx="55" cy="47" r="1"/>
      <circle cx="30" cy="52" r="1"/><circle cx="35" cy="52" r="1"/><circle cx="40" cy="52" r="1"/><circle cx="45" cy="52" r="1"/><circle cx="50" cy="52" r="1"/><circle cx="55" cy="52" r="1"/>
      <circle cx="30" cy="57" r="1"/><circle cx="35" cy="57" r="1"/><circle cx="40" cy="57" r="1"/><circle cx="45" cy="57" r="1"/><circle cx="50" cy="57" r="1"/><circle cx="55" cy="57" r="1"/>
      <circle cx="30" cy="62" r="1"/><circle cx="35" cy="62" r="1"/><circle cx="40" cy="62" r="1"/><circle cx="45" cy="62" r="1"/><circle cx="50" cy="62" r="1"/><circle cx="55" cy="62" r="1"/>
      <circle cx="30" cy="67" r="1"/><circle cx="35" cy="67" r="1"/><circle cx="40" cy="67" r="1"/><circle cx="45" cy="67" r="1"/><circle cx="50" cy="67" r="1"/><circle cx="55" cy="67" r="1"/>
    </g>
    <!-- Shine -->
    <path d="M15,26 Q55,22 105,26" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
